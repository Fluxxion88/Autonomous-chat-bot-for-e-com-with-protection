services:
  - type: web
    name: proof-of-audit
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run src/main.py --server.port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: OPENAI_API_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
